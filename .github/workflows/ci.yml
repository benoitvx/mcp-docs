name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Tests
        run: uv run pytest --cov=mcp_docs -v

      - name: Audit dependencies
        # Audit only the project's runtime deps (--no-dev), not the dev
        # toolchain itself. pip-audit pulls pip in as a transitive dep,
        # and pip CVEs are irrelevant for the published package.
        run: |
          uv export --no-hashes --no-emit-project --no-dev --format requirements-txt > /tmp/requirements.txt
          uv run pip-audit -r /tmp/requirements.txt

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
